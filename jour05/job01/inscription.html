<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <script src="inscription-script.js" defer></script>
</head>
<body>
    <form id="newAccountForm">
        <input type="text" id="userFirstName" name="userFirstName" placeholder="Prénom" required><br>
        <input type="text" id="userLastName" name="userLastName" placeholder="Nom de famille" required><br>
        <input type="email" id="userEmail" name="userEmail" placeholder="Email" required><br>
        <input type="password" id="userPassword" name="userPassword" placeholder="Mot de passe" required><br>
        <input type="password" id="userConfirmationPassword" name="userConfirmationPassword" placeholder="Confirmation de mot de passe" required><br>
        <input type="text" id="userAddress" name="userAddress" placeholder="Adresse" required><br>
        <input type="text" id="userPostalCode" name="userPostalCode" placeholder="Code postal" required><br><br>
        <input type="submit" value="Créer compte">
    </form> 
</body>
</html>
